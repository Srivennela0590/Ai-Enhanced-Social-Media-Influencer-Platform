<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Generator — InfluenceAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>:root{--primary:#6C4DF6;--bg:#F8F9FC;}body{background:var(--bg);font-family:'Segoe UI',sans-serif;}.gradient-text{background:linear-gradient(135deg,var(--primary),#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.btn-primary{background:linear-gradient(135deg,var(--primary),#8B5CF6);border:none;}.glass-card{background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:1.5rem;}.output-box{background:#F1F5F9;border-radius:12px;padding:1.5rem;min-height:200px;white-space:pre-wrap;font-size:0.9rem;line-height:1.7;}</style>
</head>
<body>
    <nav class="navbar navbar-light bg-white border-bottom px-4"><a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-stars" style="color:var(--primary)"></i> <span class="gradient-text">InfluenceAI</span></a><div><a href="brand_dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Dashboard</a></div></nav>
    <div class="container py-4">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="rounded-3 d-flex align-items-center justify-content-center text-white" style="width:48px;height:48px;background:linear-gradient(135deg,var(--primary),#EC4899)"><i class="bi bi-magic fs-4"></i></div>
            <div><h4 class="fw-bold mb-0">AI Caption Generator</h4><p class="text-muted mb-0 small">Generate optimized social media captions</p></div>
        </div>
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="glass-card">
                    <div class="row g-3">
                        <div class="col-6"><label class="form-label small">Platform</label><select class="form-select" id="platform"><option>Instagram</option><option>TikTok</option><option>YouTube</option><option>Twitter</option><option>LinkedIn</option></select></div>
                        <div class="col-6"><label class="form-label small">Tone</label><select class="form-select" id="tone"><option value="professional">Professional</option><option value="casual">Casual</option><option value="humorous">Humorous</option><option value="inspirational">Inspirational</option><option value="educational">Educational</option></select></div>
                        <div class="col-12"><label class="form-label small">Niche</label><input class="form-control" id="niche" value="Technology"></div>
                        <div class="col-12"><label class="form-label small">Topic</label><input class="form-control" id="topic" value="AI-Powered Marketing Tools"></div>
                        <div class="col-6"><div class="form-check"><input type="checkbox" class="form-check-input" id="hashtags" checked><label class="form-check-label small">Hashtags</label></div></div>
                        <div class="col-6"><div class="form-check"><input type="checkbox" class="form-check-input" id="emojis" checked><label class="form-check-label small">Emojis</label></div></div>
                        <div class="col-12"><button class="btn btn-primary w-100" id="generateBtn" onclick="generateCaption()"><i class="bi bi-stars"></i> Generate Caption</button></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold mb-0"><i class="bi bi-chat-quote text-primary"></i> Generated Caption</h6>
                        <span class="badge bg-light text-muted" id="sourceBadge"></span>
                    </div>
                    <div class="output-box" id="outputBox">Click "Generate Caption" to create an AI-powered caption for your content.</div>
                    <div class="d-flex justify-content-between mt-3">
                        <small class="text-muted" id="charCount"></small>
                        <button class="btn btn-sm btn-outline-primary" onclick="navigator.clipboard.writeText(document.getElementById('outputBox').textContent)"><i class="bi bi-clipboard"></i> Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API='http://127.0.0.1:5000';const token=localStorage.getItem('influenceai_token');const headers={'Content-Type':'application/json','Authorization':`Bearer ${token}`};
        async function generateCaption(){
            const btn=document.getElementById('generateBtn');btn.disabled=true;btn.innerHTML='<span class="spinner-border spinner-border-sm"></span> Generating...';
            const body={platform:document.getElementById('platform').value,niche:document.getElementById('niche').value,topic:document.getElementById('topic').value,tone:document.getElementById('tone').value,includeHashtags:document.getElementById('hashtags').checked,includeEmojis:document.getElementById('emojis').checked};
            try{const res=await fetch(`${API}/api/ai/caption`,{method:'POST',headers,body:JSON.stringify(body)});const data=await res.json();
                if(data.success){document.getElementById('outputBox').textContent=data.data.caption;document.getElementById('charCount').textContent=`${data.data.characterCount} characters`;document.getElementById('sourceBadge').textContent=data.data.source==='gemini'?'✦ Gemini AI':'⚡ Smart Template';document.getElementById('sourceBadge').className=`badge ${data.data.source==='gemini'?'bg-success-subtle text-success':'bg-warning-subtle text-warning'}`;}
            }catch(e){document.getElementById('outputBox').textContent='Generation failed. Ensure backend is running.';}
            btn.disabled=false;btn.innerHTML='<i class="bi bi-stars"></i> Generate Caption';
        }
    </script>
</body>
</html>

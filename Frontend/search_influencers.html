<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Influencers — InfluenceAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root{--primary:#6C4DF6;--bg:#F8F9FC;}body{background:var(--bg);font-family:'Segoe UI',sans-serif;}
        .gradient-text{background:linear-gradient(135deg,var(--primary),#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .btn-primary{background:linear-gradient(135deg,var(--primary),#8B5CF6);border:none;}
        .inf-card{background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:1.5rem;transition:transform 0.3s,box-shadow 0.3s;}
        .inf-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(108,77,246,0.12);}
        .avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#EC4899);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:1.2rem;}
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-stars" style="color:var(--primary)"></i> <span class="gradient-text">InfluenceAI</span></a>
        <div><a href="brand_dashboard.html" class="btn btn-outline-secondary btn-sm me-2"><i class="bi bi-arrow-left"></i> Dashboard</a></div>
    </nav>
    <div class="container py-4">
        <h4 class="fw-bold mb-1">Find Influencers</h4>
        <p class="text-muted mb-4">Search and filter influencers for your campaigns</p>
        <div class="row g-2 mb-4">
            <div class="col-md-4"><input type="text" class="form-control" id="searchInput" placeholder="Search by name, category..."></div>
            <div class="col-md-2"><select class="form-select" id="catFilter"><option value="">All Categories</option><option>Technology</option><option>Fashion & Beauty</option><option>Fitness & Health</option><option>Food & Cooking</option><option>Travel & Adventure</option><option>Gaming & Esports</option><option>Education</option><option>Lifestyle & Wellness</option></select></div>
            <div class="col-md-2"><input type="number" class="form-control" id="minFollowers" placeholder="Min followers"></div>
            <div class="col-md-2"><select class="form-select" id="sortBy"><option value="followers">Sort: Followers</option><option value="engagement">Sort: Engagement</option><option value="score">Sort: Score</option></select></div>
            <div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadInfluencers()"><i class="bi bi-search"></i> Search</button></div>
        </div>
        <p class="text-muted small mb-3" id="resultCount">Loading...</p>
        <div class="row g-3" id="influencersGrid">
            <div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>
        </div>
    </div>
    <script>
        const API = 'http://127.0.0.1:5000';
        const token = localStorage.getItem('influenceai_token');
        const headers = {'Content-Type':'application/json','Authorization':`Bearer ${token}`};

        async function loadInfluencers() {
            const params = new URLSearchParams();
            const search = document.getElementById('searchInput').value;
            const cat = document.getElementById('catFilter').value;
            const min = document.getElementById('minFollowers').value;
            const sort = document.getElementById('sortBy').value;
            if (search) params.set('search', search);
            if (cat) params.set('category', cat);
            if (min) params.set('minFollowers', min);
            params.set('sort', sort);
            params.set('limit', '50');

            try {
                const res = await fetch(`${API}/api/influencers?${params}`, {headers});
                const data = await res.json();
                const influencers = data.data || [];
                document.getElementById('resultCount').textContent = `${influencers.length} influencers found`;
                const grid = document.getElementById('influencersGrid');
                if (influencers.length === 0) { grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">No influencers found</div>'; return; }
                grid.innerHTML = influencers.map(i => `
                    <div class="col-md-6 col-lg-4">
                        <div class="inf-card">
                            <div class="d-flex align-items-center gap-3 mb-3">
                                <div class="avatar">${(i.displayName||'U')[0]}</div>
                                <div><strong>${i.displayName}</strong>${i.verified?'<i class="bi bi-patch-check-fill text-primary ms-1"></i>':''}<br><small class="text-muted">${i.category||i.niche}</small></div>
                            </div>
                            <p class="small text-muted mb-3">${(i.bio||'').substring(0,80)}${(i.bio||'').length>80?'...':''}</p>
                            <div class="row g-2 mb-3 text-center">
                                <div class="col-4"><div class="bg-light rounded p-2"><strong class="d-block">${(i.totalFollowers/1000|0)}K</strong><small class="text-muted" style="font-size:0.7rem">Followers</small></div></div>
                                <div class="col-4"><div class="bg-light rounded p-2"><strong class="d-block">${i.engagementRate}%</strong><small class="text-muted" style="font-size:0.7rem">Engagement</small></div></div>
                                <div class="col-4"><div class="bg-light rounded p-2"><strong class="d-block">$${i.pricePerPost||0}</strong><small class="text-muted" style="font-size:0.7rem">Per Post</small></div></div>
                            </div>
                            <div class="d-flex gap-2 small text-muted mb-3">${i.location?`<span><i class="bi bi-geo-alt"></i> ${i.location}</span>`:''}<span>${i.audienceAgeGroup||'18-34'}</span><span>Score: ${i.previousCampaignScore||0}</span></div>
                            <button class="btn btn-primary btn-sm w-100"><i class="bi bi-send"></i> Invite</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { document.getElementById('influencersGrid').innerHTML = '<div class="col-12 text-center py-5 text-muted">Connection failed</div>'; }
        }
        loadInfluencers();
    </script>
</body>
</html>

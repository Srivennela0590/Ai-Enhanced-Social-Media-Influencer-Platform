<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — InfluenceAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #6C4DF6; --secondary: #8B5CF6; }
        body { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #0f172a, #1a0533); }
        .auth-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; }
        .form-control, .form-select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .form-control:focus, .form-select:focus { background: rgba(255,255,255,0.08); border-color: var(--primary); color: #fff; box-shadow: 0 0 0 0.2rem rgba(108,77,246,0.25); }
        .form-control::placeholder { color: #64748B; }
        .form-select { color: #94A3B8; }
        .gradient-text { background: linear-gradient(135deg, var(--primary), #EC4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        a { color: var(--primary); }
        .role-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; cursor: pointer; transition: all 0.3s; text-align: center; }
        .role-btn.active { border-color: var(--primary); background: rgba(108,77,246,0.1); }
        .role-btn:hover { border-color: var(--primary); }
    </style>
</head>
<body class="text-white">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none"><h4><i class="bi bi-stars" style="color:var(--primary)"></i> <span class="gradient-text">InfluenceAI</span></h4></a>
                    <h2 class="fw-bold mt-3">Create your account</h2>
                    <p class="text-white-50">Join the future of influencer marketing</p>
                </div>
                <div class="auth-card p-4 p-md-5">
                    <div id="error-alert" class="alert alert-danger d-none"></div>
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label small text-white-50">I am a</label>
                            <div class="row g-2">
                                <div class="col-6"><div class="role-btn active" id="role-brand" onclick="setRole('brand')"><i class="bi bi-building fs-4 d-block mb-1" style="color:var(--primary)"></i><small class="fw-semibold">Brand</small></div></div>
                                <div class="col-6"><div class="role-btn" id="role-influencer" onclick="setRole('influencer')"><i class="bi bi-star fs-4 d-block mb-1" style="color:#EC4899"></i><small class="fw-semibold">Influencer</small></div></div>
                            </div>
                            <input type="hidden" id="role" value="brand">
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-6"><label class="form-label small text-white-50">First Name</label><input type="text" class="form-control py-2" id="firstName" required></div>
                            <div class="col-6"><label class="form-label small text-white-50">Last Name</label><input type="text" class="form-control py-2" id="lastName" required></div>
                        </div>
                        <div class="mb-3"><label class="form-label small text-white-50">Email</label><input type="email" class="form-control py-2" id="email" required></div>
                        <div class="mb-3"><label class="form-label small text-white-50">Password</label><input type="password" class="form-control py-2" id="password" minlength="8" required></div>
                        <div id="brand-fields">
                            <div class="mb-3"><label class="form-label small text-white-50">Company Name</label><input type="text" class="form-control py-2" id="companyName"></div>
                            <div class="mb-3"><label class="form-label small text-white-50">Industry</label>
                                <select class="form-select py-2" id="industry"><option>Technology</option><option>Fashion</option><option>Beauty</option><option>Food & Beverage</option><option>Fitness</option><option>Travel</option><option>Gaming</option><option>Education</option></select>
                            </div>
                        </div>
                        <div id="influencer-fields" class="d-none">
                            <div class="mb-3"><label class="form-label small text-white-50">Display Name</label><input type="text" class="form-control py-2" id="displayName"></div>
                            <div class="mb-3"><label class="form-label small text-white-50">Niche</label>
                                <select class="form-select py-2" id="niche"><option>Technology</option><option>Fashion</option><option>Beauty</option><option>Fitness</option><option>Food</option><option>Travel</option><option>Gaming</option><option>Education</option><option>Lifestyle</option></select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mt-2" id="submitBtn">Create Account <i class="bi bi-arrow-right"></i></button>
                    </form>
                </div>
                <p class="text-center mt-4 text-white-50 small">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>
    <script>
        function setRole(role) {
            document.getElementById('role').value = role;
            document.getElementById('role-brand').classList.toggle('active', role === 'brand');
            document.getElementById('role-influencer').classList.toggle('active', role === 'influencer');
            document.getElementById('brand-fields').classList.toggle('d-none', role !== 'brand');
            document.getElementById('influencer-fields').classList.toggle('d-none', role !== 'influencer');
        }
        const API = 'http://127.0.0.1:5000';
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Creating...';
            document.getElementById('error-alert').classList.add('d-none');
            const role = document.getElementById('role').value;
            const body = {
                email: document.getElementById('email').value, password: document.getElementById('password').value,
                firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value, role,
            };
            if (role === 'brand') { body.companyName = document.getElementById('companyName').value; body.industry = document.getElementById('industry').value; }
            else { body.displayName = document.getElementById('displayName').value; body.niche = document.getElementById('niche').value; }
            try {
                const res = await fetch(`${API}/api/auth/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('influenceai_token', data.data.accessToken);
                    localStorage.setItem('influenceai_user', JSON.stringify(data.data.user));
                    window.location.href = role === 'brand' ? 'brand_dashboard.html' : 'influencer_dashboard.html';
                } else {
                    document.getElementById('error-alert').textContent = data.error; document.getElementById('error-alert').classList.remove('d-none');
                }
            } catch(err) { document.getElementById('error-alert').textContent = 'Connection failed'; document.getElementById('error-alert').classList.remove('d-none'); }
            btn.disabled = false; btn.innerHTML = 'Create Account <i class="bi bi-arrow-right"></i>';
        });
    </script>
</body>
</html>

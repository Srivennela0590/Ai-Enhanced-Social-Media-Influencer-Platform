<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaigns — InfluenceAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>:root{--primary:#6C4DF6;--bg:#F8F9FC;}body{background:var(--bg);font-family:'Segoe UI',sans-serif;}.gradient-text{background:linear-gradient(135deg,var(--primary),#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.btn-primary{background:linear-gradient(135deg,var(--primary),#8B5CF6);border:none;}.glass-card{background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:1.5rem;}</style>
</head>
<body>
    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-stars" style="color:var(--primary)"></i> <span class="gradient-text">InfluenceAI</span></a>
        <div><a href="brand_dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Dashboard</a></div>
    </nav>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div><h4 class="fw-bold mb-0">Campaigns</h4><p class="text-muted mb-0">Manage your marketing campaigns</p></div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal"><i class="bi bi-plus-lg"></i> Create Campaign</button>
        </div>
        <div class="row g-3" id="campaignsList"><div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div></div>
    </div>
    <!-- Create Modal -->
    <div class="modal fade" id="createModal"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Create Campaign</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">
        <form id="createForm">
            <div class="mb-3"><label class="form-label">Title</label><input class="form-control" id="cTitle" required></div>
            <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" id="cDesc" rows="3" required></textarea></div>
            <div class="row g-3 mb-3"><div class="col-md-6"><label class="form-label">Category</label><select class="form-select" id="cCat"><option>Technology</option><option>Fashion & Beauty</option><option>Fitness & Health</option><option>Food & Cooking</option><option>Travel</option><option>Gaming</option><option>Education</option><option>Lifestyle</option></select></div><div class="col-md-6"><label class="form-label">Budget ($)</label><input type="number" class="form-control" id="cBudget" required></div></div>
            <div class="mb-3"><label class="form-label">Target Audience</label><input class="form-control" id="cAudience" placeholder="e.g. 18-34 tech enthusiasts"></div>
            <div class="mb-3"><label class="form-label">Requirements</label><textarea class="form-control" id="cReqs" rows="2"></textarea></div>
            <div class="row g-3 mb-3"><div class="col-md-6"><label class="form-label">Start Date</label><input type="date" class="form-control" id="cStart"></div><div class="col-md-6"><label class="form-label">End Date</label><input type="date" class="form-control" id="cEnd"></div></div>
            <button type="submit" class="btn btn-primary w-100">Create Campaign</button>
        </form>
    </div></div></div></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API='http://127.0.0.1:5000';const token=localStorage.getItem('influenceai_token');const headers={'Content-Type':'application/json','Authorization':`Bearer ${token}`};
        async function load(){
            try{const res=await fetch(`${API}/api/campaigns`,{headers});const data=await res.json();const camps=data.data||[];const div=document.getElementById('campaignsList');
            if(!camps.length){div.innerHTML='<div class="col-12 text-center py-5 text-muted">No campaigns yet</div>';return;}
            div.innerHTML=camps.map(c=>{const badge=c.status==='active'?'bg-success-subtle text-success':c.status==='draft'?'bg-secondary-subtle text-secondary':c.status==='paused'?'bg-warning-subtle text-warning':'bg-primary-subtle text-primary';
            return `<div class="col-md-6 col-lg-4"><div class="glass-card h-100"><div class="d-flex justify-content-between mb-2"><span class="badge ${badge}">${c.status}</span><small class="text-muted">${c.category}</small></div><h6 class="fw-bold">${c.title}</h6><p class="small text-muted">${(c.description||'').substring(0,100)}...</p><div class="d-flex gap-3 small text-muted mb-3"><span><i class="bi bi-currency-dollar"></i>$${(c.budget||0).toLocaleString()}</span><span><i class="bi bi-calendar"></i>${c.endDate||'TBD'}</span></div><div class="d-flex gap-2"><button class="btn btn-outline-primary btn-sm flex-grow-1" onclick="deleteCampaign('${c.id}')"><i class="bi bi-trash"></i> Delete</button></div></div></div>`}).join('');}catch(e){console.error(e);}
        }
        document.getElementById('createForm').addEventListener('submit',async function(e){e.preventDefault();
            const body={title:document.getElementById('cTitle').value,description:document.getElementById('cDesc').value,category:document.getElementById('cCat').value,budget:parseFloat(document.getElementById('cBudget').value),targetAudience:document.getElementById('cAudience').value,requirements:document.getElementById('cReqs').value,startDate:document.getElementById('cStart').value,endDate:document.getElementById('cEnd').value,status:'draft',platforms:['Instagram','YouTube']};
            try{const res=await fetch(`${API}/api/campaigns`,{method:'POST',headers,body:JSON.stringify(body)});const data=await res.json();if(data.success){bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();load();}}catch(e){alert('Failed');}
        });
        async function deleteCampaign(id){if(!confirm('Delete this campaign?'))return;try{await fetch(`${API}/api/campaigns/${id}`,{method:'DELETE',headers});load();}catch(e){alert('Failed');}}
        load();
    </script>
</body>
</html>

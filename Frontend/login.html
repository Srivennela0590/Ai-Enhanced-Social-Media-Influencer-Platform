<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — InfluenceAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #6C4DF6; --secondary: #8B5CF6; }
        body { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #0f172a, #1a0533); }
        .auth-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; }
        .form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .form-control:focus { background: rgba(255,255,255,0.08); border-color: var(--primary); color: #fff; box-shadow: 0 0 0 0.2rem rgba(108,77,246,0.25); }
        .form-control::placeholder { color: #64748B; }
        .gradient-text { background: linear-gradient(135deg, var(--primary), #EC4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        a { color: var(--primary); }
        .demo-box { background: rgba(108,77,246,0.1); border: 1px solid rgba(108,77,246,0.2); border-radius: 12px; }
    </style>
</head>
<body class="text-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none"><h4><i class="bi bi-stars" style="color:var(--primary)"></i> <span class="gradient-text">InfluenceAI</span></h4></a>
                    <h2 class="fw-bold mt-3">Welcome back</h2>
                    <p class="text-white-50">Sign in to your account</p>
                </div>
                <div class="auth-card p-4 p-md-5">
                    <div class="demo-box p-3 mb-4">
                        <p class="small mb-2 fw-semibold" style="color:var(--primary)">Quick demo login:</p>
                        <div class="row g-2">
                            <div class="col-6"><button class="btn btn-sm w-100" style="background:rgba(108,77,246,0.15);color:var(--primary);border:1px solid rgba(108,77,246,0.3)" onclick="document.getElementById('email').value='brand@demo.com';document.getElementById('password').value='Demo1234!'">🏢 Brand</button></div>
                            <div class="col-6"><button class="btn btn-sm w-100" style="background:rgba(236,72,153,0.15);color:#EC4899;border:1px solid rgba(236,72,153,0.3)" onclick="document.getElementById('email').value='influencer@demo.com';document.getElementById('password').value='Demo1234!'">⭐ Influencer</button></div>
                        </div>
                    </div>
                    <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label small text-white-50">Email</label>
                            <input type="email" class="form-control py-2" id="email" placeholder="you@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-white-50">Password</label>
                            <input type="password" class="form-control py-2" id="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="submitBtn">Sign In <i class="bi bi-arrow-right"></i></button>
                    </form>
                </div>
                <p class="text-center mt-4 text-white-50 small">Don't have an account? <a href="register.html">Create one free</a></p>
            </div>
        </div>
    </div>
    <script>
        const API = 'http://127.0.0.1:5000';
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';
            document.getElementById('error-alert').classList.add('d-none');
            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('influenceai_token', data.data.accessToken);
                    localStorage.setItem('influenceai_user', JSON.stringify(data.data.user));
                    const role = data.data.user.role;
                    window.location.href = role === 'brand' ? 'brand_dashboard.html' : 'influencer_dashboard.html';
                } else {
                    document.getElementById('error-alert').textContent = data.error || 'Login failed';
                    document.getElementById('error-alert').classList.remove('d-none');
                }
            } catch(err) {
                document.getElementById('error-alert').textContent = 'Server connection failed. Ensure Flask backend is running.';
                document.getElementById('error-alert').classList.remove('d-none');
            }
            btn.disabled = false; btn.innerHTML = 'Sign In <i class="bi bi-arrow-right"></i>';
        });
    </script>
</body>
</html>

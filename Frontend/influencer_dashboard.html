<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Dashboard — InfluenceAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root{--primary:#6C4DF6;--secondary:#8B5CF6;--bg:#F8F9FC;--text:#1E293B;--sidebar:#0F172A;}
        body{background:var(--bg);font-family:'Segoe UI',sans-serif;}
        .sidebar{width:260px;min-height:100vh;background:var(--sidebar);position:fixed;left:0;top:0;padding:1.5rem 1rem;z-index:100;}
        .sidebar .nav-link{color:#94A3B8;padding:0.6rem 1rem;border-radius:10px;margin-bottom:2px;font-size:0.9rem;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(108,77,246,0.15);}
        .sidebar .nav-link.active{color:var(--primary);}
        .sidebar .nav-link i{width:20px;margin-right:10px;}
        .main-content{margin-left:260px;padding:2rem;}
        .stat-card{background:#fff;border-radius:16px;padding:1.5rem;border:1px solid #E2E8F0;}
        .stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
        .gradient-text{background:linear-gradient(135deg,var(--primary),#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .glass-card{background:#fff;border-radius:16px;padding:1.5rem;border:1px solid #E2E8F0;}
        @media(max-width:768px){.sidebar{display:none;}.main-content{margin-left:0;}}
    </style>
</head>
<body>
    <div class="sidebar">
        <h5 class="text-white mb-4"><i class="bi bi-stars" style="color:var(--primary)"></i> <span class="gradient-text">InfluenceAI</span></h5>
        <nav class="nav flex-column">
            <a class="nav-link active" href="influencer_dashboard.html"><i class="bi bi-grid"></i>Overview</a>
            <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i>My Profile</a>
            <a class="nav-link" href="search_influencers.html"><i class="bi bi-megaphone"></i>Browse Campaigns</a>
            <a class="nav-link" href="campaign_details.html"><i class="bi bi-send"></i>Applications</a>
            <a class="nav-link" href="profile.html"><i class="bi bi-gear"></i>Settings</a>
        </nav>
        <div class="position-absolute bottom-0 start-0 p-3 w-100">
            <button class="btn btn-sm w-100" style="background:rgba(239,68,68,0.1);color:#EF4444;border:1px solid rgba(239,68,68,0.2)" onclick="localStorage.clear();window.location.href='login.html'"><i class="bi bi-box-arrow-left"></i> Sign Out</button>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div><h4 class="fw-bold mb-1" id="welcomeText">Welcome back 👋</h4><p class="text-muted mb-0">Your influencer overview</p></div>
            <a href="search_influencers.html" class="btn btn-primary"><i class="bi bi-search"></i> Browse Campaigns</a>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-3"><div class="stat-card"><div class="stat-icon mb-2" style="background:rgba(236,72,153,0.1);color:#EC4899"><i class="bi bi-heart"></i></div><h3 class="fw-bold mb-0" id="statFollowers">0</h3><small class="text-muted">Followers</small></div></div>
            <div class="col-6 col-lg-3"><div class="stat-card"><div class="stat-icon mb-2" style="background:rgba(108,77,246,0.1);color:var(--primary)"><i class="bi bi-graph-up"></i></div><h3 class="fw-bold mb-0" id="statEngagement">0%</h3><small class="text-muted">Engagement</small></div></div>
            <div class="col-6 col-lg-3"><div class="stat-card"><div class="stat-icon mb-2" style="background:rgba(16,185,129,0.1);color:#10B981"><i class="bi bi-currency-dollar"></i></div><h3 class="fw-bold mb-0" id="statEarnings">$0</h3><small class="text-muted">Earnings</small></div></div>
            <div class="col-6 col-lg-3"><div class="stat-card"><div class="stat-icon mb-2" style="background:rgba(59,130,246,0.1);color:#3B82F6"><i class="bi bi-briefcase"></i></div><h3 class="fw-bold mb-0" id="statCollabs">0</h3><small class="text-muted">Collaborations</small></div></div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-lg-8"><div class="glass-card"><h6 class="fw-bold mb-3">Weekly Engagement</h6><canvas id="engagementChart" height="200"></canvas></div></div>
            <div class="col-lg-4"><div class="glass-card"><h6 class="fw-bold mb-3">Application Status</h6><canvas id="appChart" height="200"></canvas></div></div>
        </div>

        <div class="row g-3">
            <div class="col-lg-6">
                <div class="glass-card"><h6 class="fw-bold mb-3"><i class="bi bi-send text-primary"></i> Invitations</h6>
                    <div id="invitationsList"><p class="text-muted text-center py-3">Loading...</p></div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="glass-card"><h6 class="fw-bold mb-3"><i class="bi bi-briefcase text-primary"></i> Collaborations</h6>
                    <div id="collabsList"><p class="text-muted text-center py-3">Loading...</p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:5000';
        const token = localStorage.getItem('influenceai_token');
        const user = JSON.parse(localStorage.getItem('influenceai_user') || '{}');
        if (!token) window.location.href = 'login.html';
        document.getElementById('welcomeText').textContent = `Welcome, ${user.firstName || 'Creator'} 👋`;
        const headers = {'Content-Type':'application/json','Authorization':`Bearer ${token}`};

        async function loadDashboard() {
            try {
                const [appRes, invRes, collabRes, infRes] = await Promise.all([
                    fetch(`${API}/api/applications`, {headers}), fetch(`${API}/api/invitations`, {headers}),
                    fetch(`${API}/api/collaborations`, {headers}), fetch(`${API}/api/influencers`, {headers}),
                ]);
                const apps = (await appRes.json()).data || [];
                const invs = (await invRes.json()).data || [];
                const collabs = (await collabRes.json()).data || [];
                const infData = (await infRes.json()).data || [];
                const myProfile = infData.find(i => i.email === user.email) || {};

                document.getElementById('statFollowers').textContent = ((myProfile.totalFollowers||0)/1000|0) + 'K';
                document.getElementById('statEngagement').textContent = (myProfile.engagementRate||0) + '%';
                document.getElementById('statEarnings').textContent = '$' + collabs.filter(c=>c.status==='completed').reduce((s,c)=>s+(c.agreedRate||0),0).toLocaleString();
                document.getElementById('statCollabs').textContent = collabs.length;

                // Invitations
                const invDiv = document.getElementById('invitationsList');
                if (invs.length === 0) invDiv.innerHTML = '<p class="text-muted text-center py-3">No invitations yet</p>';
                else invDiv.innerHTML = invs.slice(0,4).map(i => `<div class="d-flex align-items-center gap-3 p-2 border-bottom"><div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold" style="width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#EC4899)">${(i.brandName||'B')[0]}</div><div class="flex-grow-1"><strong class="small">${i.campaignTitle||''}</strong><br><small class="text-muted">${i.brandName||''}</small></div><span class="badge ${i.status==='pending'?'bg-warning-subtle text-warning':'bg-success-subtle text-success'}">${i.status}</span></div>`).join('');

                // Collaborations
                const cDiv = document.getElementById('collabsList');
                if (collabs.length === 0) cDiv.innerHTML = '<p class="text-muted text-center py-3">No collaborations yet</p>';
                else cDiv.innerHTML = collabs.slice(0,4).map(c => `<div class="d-flex align-items-center gap-3 p-2 border-bottom"><div class="rounded d-flex align-items-center justify-content-center text-white fw-bold" style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#EC4899)">${(c.brandName||'B')[0]}</div><div class="flex-grow-1"><strong class="small">${c.campaignTitle||''}</strong><br><small class="text-muted">$${c.agreedRate||0}</small></div><span class="badge ${c.status==='completed'?'bg-success-subtle text-success':c.status==='in_progress'?'bg-primary-subtle text-primary':'bg-warning-subtle text-warning'}">${c.status}</span></div>`).join('');

                // Charts
                const pending = apps.filter(a=>a.status==='pending').length;
                const accepted = apps.filter(a=>a.status==='accepted').length;
                const rejected = apps.filter(a=>a.status==='rejected').length;
                new Chart(document.getElementById('appChart'), {type:'doughnut',data:{labels:['Pending','Accepted','Rejected'],datasets:[{data:[pending,accepted,rejected],backgroundColor:['#F59E0B','#10B981','#EF4444']}]},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12}}}}});
                new Chart(document.getElementById('engagementChart'), {type:'bar',data:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],datasets:[{label:'Interactions',data:[4200,5800,3900,7200,6100,8400,5500],backgroundColor:'rgba(236,72,153,0.6)',borderRadius:8}]},options:{scales:{y:{beginAtZero:true}},plugins:{legend:{display:false}}}});
            } catch(e) { console.error(e); }
        }
        loadDashboard();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — InfluenceAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>:root{--primary:#6C4DF6;--bg:#F8F9FC;}body{background:var(--bg);font-family:'Segoe UI',sans-serif;}.gradient-text{background:linear-gradient(135deg,var(--primary),#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.btn-primary{background:linear-gradient(135deg,var(--primary),#8B5CF6);border:none;}.glass-card{background:#fff;border:1px solid #E2E8F0;border-radius:16px;padding:2rem;}.avatar-lg{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,var(--primary),#EC4899);display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-weight:bold;}</style>
</head>
<body>
    <nav class="navbar navbar-light bg-white border-bottom px-4"><a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-stars" style="color:var(--primary)"></i> <span class="gradient-text">InfluenceAI</span></a><div><a href="brand_dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Dashboard</a></div></nav>
    <div class="container py-4">
        <h4 class="fw-bold mb-4">Profile Settings</h4>
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card text-center">
                    <div class="avatar-lg mx-auto mb-3" id="avatarDisplay">U</div>
                    <h5 class="fw-bold" id="profileName">User</h5>
                    <p class="text-muted small" id="profileEmail">user@email.com</p>
                    <span class="badge bg-primary-subtle text-primary" id="profileRole">Role</span>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="glass-card">
                    <h6 class="fw-bold mb-3">Account Information</h6>
                    <div class="row g-3 mb-3"><div class="col-md-6"><label class="form-label small text-muted">First Name</label><input class="form-control" id="firstName"></div><div class="col-md-6"><label class="form-label small text-muted">Last Name</label><input class="form-control" id="lastName"></div></div>
                    <div class="mb-3"><label class="form-label small text-muted">Email</label><input class="form-control" id="email" disabled></div>
                    <div id="success-msg" class="alert alert-success d-none">Profile saved!</div>
                    <button class="btn btn-primary" onclick="saveProfile()"><i class="bi bi-check-lg"></i> Save Changes</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem('influenceai_user')||'{}');
        document.getElementById('firstName').value = user.firstName||'';
        document.getElementById('lastName').value = user.lastName||'';
        document.getElementById('email').value = user.email||'';
        document.getElementById('profileName').textContent = `${user.firstName||''} ${user.lastName||''}`;
        document.getElementById('profileEmail').textContent = user.email||'';
        document.getElementById('profileRole').textContent = (user.role||'user').toUpperCase();
        document.getElementById('avatarDisplay').textContent = (user.firstName||'U')[0];
        function saveProfile(){document.getElementById('success-msg').classList.remove('d-none');setTimeout(()=>document.getElementById('success-msg').classList.add('d-none'),2000);}
    </script>
</body>
</html>
